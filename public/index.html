<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeekFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <!-- ── AUTH SCREEN ─────────────────────────────── -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-mark">W</span>
        <span class="logo-text">WeekFlow</span>
      </div>
      <p class="auth-subtitle">Deine Woche. Strukturiert.</p>
      <button id="login-btn" class="btn btn-primary btn-full">
        Anmelden / Registrieren
      </button>
      <p class="auth-hint">Powered by Netlify Identity</p>
    </div>
  </div>

  <!-- ── APP ────────────────────────────────────── -->
  <div id="app" class="app hidden">

    <!-- HEADER -->
    <header class="header">
      <div class="header-inner">
        <div class="header-logo">
          <span class="logo-mark">W</span>
          <span class="logo-text">WeekFlow</span>
        </div>
        <div class="header-actions">
          <button id="theme-toggle" class="icon-btn" title="Dark Mode">
            <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="hidden"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <div class="user-menu">
            <span id="user-email" class="user-email"></span>
            <button id="logout-btn" class="btn btn-ghost btn-sm">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <!-- NAV TABS -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="week">📅 Woche</button>
      <button class="tab-btn" data-tab="tasks">✅ Aufgaben</button>
      <button class="tab-btn" data-tab="bets">🎰 Wetten</button>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main">

      <!-- ── WEEK VIEW ── -->
      <section id="tab-week" class="tab-content active">
        <div class="section-header">
          <h2>Diese Woche</h2>
          <span class="week-label" id="week-label"></span>
        </div>
        <div class="week-grid" id="week-grid">
          <!-- JS renders day columns -->
        </div>
      </section>

      <!-- ── TASK VIEW ── -->
      <section id="tab-tasks" class="tab-content">
        <div class="section-header">
          <h2>Alle Aufgaben</h2>
          <button class="btn btn-primary btn-sm" id="open-add-modal">+ Aufgabe</button>
        </div>

        <div class="filter-bar">
          <button class="filter-btn active" data-filter="all">Alle</button>
          <button class="filter-btn" data-filter="open">Offen</button>
          <button class="filter-btn" data-filter="done">Erledigt</button>
        </div>

        <div id="task-list" class="task-list">
          <div class="empty-state">Noch keine Aufgaben. Leg eine an!</div>
        </div>
      </section>

      <!-- ── BETS VIEW ── -->
      <section id="tab-bets" class="tab-content">
        <div class="section-header">
          <h2>Aktuelle Sportwetten</h2>
          <button class="btn btn-ghost btn-sm" id="refresh-bets">↻ Aktualisieren</button>
        </div>
        <p class="bets-disclaimer">Nur zur Demo – keine echten Wetten. Daten via The Odds API.</p>
        <div id="bets-list" class="bets-list">
          <div class="loading-state">
            <div class="spinner"></div>
            <span>Lade Quoten…</span>
          </div>
        </div>
      </section>

    </main>
  </div>

  <!-- ── ADD TASK MODAL ── -->
  <div id="task-modal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Neue Aufgabe</h3>
        <button class="icon-btn" id="close-modal">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="task-edit-id" />
        <div class="form-group">
          <label>Titel *</label>
          <input type="text" id="task-title-input" placeholder="Was ist zu tun?" maxlength="80" />
        </div>
        <div class="form-group">
          <label>Beschreibung</label>
          <textarea id="task-desc-input" placeholder="Details…" rows="3"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Priorität</label>
            <select id="task-priority-input">
              <option value="low">🟢 Niedrig</option>
              <option value="medium" selected>🟡 Mittel</option>
              <option value="high">🔴 Hoch</option>
            </select>
          </div>
          <div class="form-group">
            <label>Tag</label>
            <select id="task-day-input">
              <option value="">Kein Tag</option>
              <option value="Mo">Montag</option>
              <option value="Di">Dienstag</option>
              <option value="Mi">Mittwoch</option>
              <option value="Do">Donnerstag</option>
              <option value="Fr">Freitag</option>
              <option value="Sa">Samstag</option>
              <option value="So">Sonntag</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Fällig am</label>
          <input type="date" id="task-due-input" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="cancel-modal">Abbrechen</button>
        <button class="btn btn-primary" id="save-task-btn">Speichern</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
